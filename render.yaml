services:
  # PostgreSQL Database Service
  - type: pgsql
    name: ams-db
    plan: free

  # Tomcat Application Service
  - type: web
    name: ams-app
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromService:
          name: ams-db
          type: pgsql
      - key: PORT
        value: 8080
