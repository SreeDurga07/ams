databases:
  # Render Postgres instance
  - name: ams-db
    plan: free
    databaseName: ams_db
    user: ams_user

services:
  # Tomcat application service using Docker
  - type: web
    name: ams-app
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ams-db
          property: connectionString
      - key: PORT
        value: "8080"
      - key: DB_INIT
        value: "true"
