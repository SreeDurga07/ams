# ============================================================
# Asset Management System - database configuration
# Edit these values to match your environment, then restart
# Tomcat so the new settings are picked up.
# ============================================================

# ---- MySQL (default) ----
db.url=jdbc:mysql://<your-host>:3306/ams_db?useSSL=true&serverTimezone=UTC
db.user=<your-user>
db.password=<your-password>

# ---- Oracle (uncomment and use instead of the MySQL block above) ----
# db.driver=oracle.jdbc.driver.OracleDriver
# db.url=jdbc:oracle:thin:@localhost:1521:xe
# db.user=ams_user
# db.password=ams_password
